name = "test_device_properties"
description = "Integration test for device property extraction - plug in a USB device to trigger"

[[triggers]]
kind = "device-connection"
events = ["Add"]
device_types = ["usb"]
macos_notification_type = "FirstPublish"

[[conditions]]
kind = "shell"
script = "true"

[[executors]]
kind = "shell"
script = '''
set -euo pipefail

# Load device properties from state
sytter-vars

echo "=== Device Connection Detected ==="
echo "Name: ${sytter_device_name:-<not available>}"
echo "Vendor ID: ${sytter_device_vendor_id:-<not available>}"
echo "Product ID: ${sytter_device_product_id:-<not available>}"
echo "Serial Number: ${sytter_device_serial_number:-<not available>}"
echo "Location ID: ${sytter_device_location_id:-<not available>}"
echo "BSD Name: ${sytter_device_bsd_name:-<not available>}"
echo "===================================="

# Write to test output file
echo "$(date +%s)" >> "$SYTTER_TEST_OUTPUT"
'''

[[failures]]
kind = "shell"
script = '''
echo "FAILED to process device connection" >> "$SYTTER_TEST_OUTPUT"
'''
