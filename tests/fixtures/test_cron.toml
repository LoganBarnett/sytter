name = "test_cron_trigger"
description = "Integration test for cron trigger - runs every 5 seconds"

[[triggers]]
kind = "cron"
# Run every 5 seconds
cron = "*/5 * * * * *"

[[conditions]]
kind = "shell"
# Always return true
script = "true"

[[executors]]
kind = "shell"
# Write a timestamp to a file to track executions
script = """
echo "$(date +%s)" >> "$SYTTER_TEST_OUTPUT"
"""

[[failures]]
kind = "shell"
script = """
echo "FAILURE: $?" >> "$SYTTER_TEST_OUTPUT"
"""
