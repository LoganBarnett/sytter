name = "test_device_connection_trigger"
description = "Integration test for device connection trigger - monitors USB devices"

[[trigger]]
kind = "device-connection"
events = ["Add"]
device_types = ["usb"]
# Optional: Override with macOS-specific settings.
macos_notification_type = "FirstPublish"

[[condition]]
kind = "shell"
script = "true"

[[execute]]
kind = "shell"
script = """
echo "$(date +%s)" >> "$SYTTER_TEST_OUTPUT"
"""

[[failure]]
kind = "shell"
script = """
echo "FAILED" >> "$SYTTER_TEST_OUTPUT"
"""
